<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" integrity="sha256-mmgLkCYLUQbXn0B1SRqzHar6dCnv9oZFPEC1g1cwlkk=" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css">
  <title>ChatCord App</title>
</head>
<body class="bg-slate-100">
  <div class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <div class="join-container bg-white rounded-2xl shadow-xl overflow-hidden max-w-md w-full">
      <div class="join-header bg-gradient-to-br from-emerald-600 to-emerald-700 p-8 text-center">
        <h1 class="flex items-center justify-center gap-3 text-3xl font-bold text-white">
          <i class="fas fa-comments text-4xl"></i>
          ChatCord
        </h1>
        <p class="mt-2 text-emerald-100">Join a room to start chatting</p>
      </div>
      <div class="join-main p-8">
        <form action="chat.html">
          <div class="form-control mb-5">
            <label for="username" class="block text-sm font-bold text-slate-700 mb-2">Display Name</label>
            <input
              type="text"
              name="username"
              id="username"
              placeholder="Enter username..."
              required
              class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all"
            />
          </div>
          <div class="form-control mb-6">
            <label for="room" class="block text-sm font-bold text-slate-700 mb-2">Select Room</label>
            <select name="room" id="room" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-xl text-slate-800 focus:outline-none focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all">
              <option value="01">Room 01</option>
              <option value="02">Room 02</option>
              <option value="03">Room 03</option>
              <option value="04">Room 04</option>
              <option value="05">Room 05</option>
              <option value="06">Room 06</option>
            </select>
          </div>
          <button type="submit" class="btn w-full py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 hover:-translate-y-1 hover:shadow-lg active:translate-y-0 active:shadow-sm transition-all">
            Join Chat
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
